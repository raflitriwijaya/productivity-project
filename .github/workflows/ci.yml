name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server — lint, audit, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Phase 3: fail the build on any high-severity advisory
      - name: Security audit
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint --if-present

      # Phase 4: real vitest suite — auth, finance math, ownership, settle atomicity, upload filter
      - name: Tests
        run: npm test

  client:
    name: Client — lint, build, audit, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Phase 3: fail on high-severity client-side advisories
      - name: Security audit
        run: npm audit --audit-level=high

      # Phase 4: zero warnings enforced via --max-warnings 0 in the lint script
      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # Phase 4: markdown sanitization regression test (confirms rehype-sanitize holds)
      - name: Tests
        run: npm test
