name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server — lint, audit, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    # Phase 9: real Postgres so integration tests (Phase 10) run against a true DB.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: productivity
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: productivity_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U productivity -d productivity_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      # Phase 9: consumed by the Phase 10 integration suite; mocked unit tests ignore it.
      DATABASE_URL: postgresql://productivity:ci_test_password@localhost:5432/productivity_test
      SESSION_SECRET: ci_test_session_secret_at_least_32_chars_long
      CLIENT_ORIGIN: http://localhost:5173
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Phase 3: fail the build on any high-severity advisory
      - name: Security audit
        run: npm audit --audit-level=high

      # Phase 9: lint script now exists (eslint.config.js added); --if-present removed.
      - name: Lint
        run: npm run lint

      # Phase 9: run migrations against the CI Postgres before the test suite.
      - name: Migrate test DB
        run: npm run migrate

      # Phase 4: real vitest suite — auth, finance math, ownership, settle atomicity, upload filter
      - name: Tests
        run: npm test

      # Phase 12: coverage report — continue-on-error until a floor is enforced
      - name: Run tests with coverage
        run: npm run test:coverage
        continue-on-error: true

  client:
    name: Client — lint, build, audit, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Phase 3: fail on high-severity client-side advisories
      - name: Security audit
        run: npm audit --audit-level=high

      # Phase 4: zero warnings enforced via --max-warnings 0 in the lint script
      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # Phase 4: markdown sanitization regression test (confirms rehype-sanitize holds)
      - name: Tests
        run: npm test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [server, client]
    # Only run on push (not PR) because e2e tests are slow and require a DB.
    if: github.event_name == 'push'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: productivity
          POSTGRES_PASSWORD: test123
          POSTGRES_DB: productivity_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Install Playwright browsers
        working-directory: client
        run: npx playwright install chromium --with-deps

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Run migrations
        working-directory: server
        env:
          DATABASE_URL: postgresql://productivity:test123@localhost:5432/productivity_test
          NODE_ENV: development
        run: npm run migrate

      - name: Start server
        working-directory: server
        env:
          DATABASE_URL: postgresql://productivity:test123@localhost:5432/productivity_test
          SESSION_SECRET: e2e-test-secret-do-not-use-in-prod-1234567890
          CLIENT_ORIGIN: http://localhost:5173
          NODE_ENV: development
          PORT: 3000
        run: node index.js &

      - name: Wait for server
        run: npx wait-on http://localhost:3000/health --timeout 30000

      - name: Start client dev server
        working-directory: client
        env:
          VITE_API_URL: http://localhost:3000
        run: npm run dev &

      - name: Wait for client
        run: npx wait-on http://localhost:5173 --timeout 30000

      - name: Run Playwright tests
        working-directory: client
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          TEST_EMAIL: e2e-test@test.local
          TEST_PASSWORD: testtest12
          CI: true
        run: npx playwright test

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: client/test-results/
          retention-days: 7
