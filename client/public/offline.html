<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Polymath OS</title>
  <style>
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0;
      background: #2b2723; color: #e2e0dc; text-align: center;
    }
    .wrap { max-width: 28rem; padding: 2rem; }
    h1 { font-size: 2rem; color: #4A7C59; margin-bottom: 0.5rem; }
    p { color: #a8a299; line-height: 1.6; margin: 0.25rem 0; }
    .dot { display: inline-block; width: 0.5rem; height: 0.5rem; border-radius: 9999px; background: #c2683f; margin-left: 0.25rem; vertical-align: middle; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>📡 Offline<span class="dot"></span></h1>
    <p>You're offline. Some features may be limited.</p>
    <p>Your data is safe — it will sync when you're back online.</p>
  </div>
</body>
</html>
