server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Phase 3: security headers — prevent clickjacking, MIME sniffing, and data exfiltration
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Phase 9: connect-src widened to allow Sentry event POSTs when VITE_SENTRY_DSN is set.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://*.ingest.sentry.io; frame-ancestors 'none';" always;

    # Phase 3: immutable cache for hashed static assets (Vite fingerprints all filenames)
    location ~* \.(js|css|svg|png|woff2|woff|ttf|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # React SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy ke container api
    location /api {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /health {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
    }
}
