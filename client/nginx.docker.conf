server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Phase 3: security headers — prevent clickjacking, MIME sniffing, and data exfiltration
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Phase 9: connect-src widened to allow Sentry event POSTs when VITE_SENTRY_DSN is set.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://*.ingest.sentry.io; frame-ancestors 'none';" always;

    # Wave 6 (PWA): the service worker and manifest must NOT be cached long-term —
    # the browser re-checks them on every load to pick up new app versions. These
    # location blocks precede the generic asset rule below so they win for sw.js /
    # the manifest even though those also match the \.(js)$ pattern.
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location = /registerSW.js {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location = /manifest.webmanifest {
        types { } default_type application/manifest+json;
        expires -1;
        add_header Cache-Control "no-cache";
    }
    location = /offline.html {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    # Phase 3: immutable cache for hashed static assets (Vite fingerprints all filenames)
    location ~* \.(js|css|svg|png|woff2|woff|ttf|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # React SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Wave 7: AI Chat streams replies over SSE. Buffering must be OFF or nginx holds
    # the whole response until completion, defeating token-by-token streaming. This
    # longer/more-specific prefix wins over the generic /api block below.
    location /api/chat/send {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # Proxy ke container api
    location /api {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /health {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
    }
}
