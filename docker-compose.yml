services:
  db:
    # Wave 6 (Moonshots): pgvector image bundles the `vector` extension required by
    # migration 014 for semantic search. Drop-in superset of postgres:16 — same
    # data dir layout, so existing postgres_data volumes mount unchanged.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: productivity
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: productivity_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U productivity -d productivity_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./server
    environment:
      DATABASE_URL: postgresql://productivity:${DB_PASSWORD}@db:5432/productivity_db
      # Phase 9: parameterized so staging/other domains don't require editing this file.
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-https://raflitriwijaya.my.id}
      SESSION_SECRET: ${SESSION_SECRET}
      NODE_ENV: production
      PORT: 3000
      # Wave 6: embeddings for semantic search + auto-tag (optional — blank disables).
      EMBEDDING_API_URL: ${EMBEDDING_API_URL:-https://api.deepseek.com/v1/embeddings}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      # Wave 7: AI Chat (DeepSeek cloud + optional local Ollama R1).
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
    volumes:
      # Phase 2: persist attachments across docker compose up --build
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # Phase 3: healthcheck so a hung-but-alive API is detected and restarted
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    build:
      context: ./client
      args:
        # Phase 9 / Fix 2: parameterized so staging/other domains work without editing this file.
        VITE_API_URL: ${VITE_API_URL:-https://raflitriwijaya.my.id}
        # Phase 9 / Fix 1: pass the Sentry DSN as a build arg so Sentry.init compiles in.
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
    ports:
      - "80:80"
    # Phase 3: wait for api to pass healthcheck before nginx starts serving
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    # Phase 3: healthcheck on nginx to detect crashed worker processes
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  # Phase 3: pg_dump sidecar — dumps DB on a cron schedule to a dedicated backup volume
  # Restore: docker run --rm -v postgres_backups:/backups -e PGPASSWORD=<DB_PASSWORD> postgres:16-alpine \
  #   sh -c "gunzip -c /backups/<file>.sql.gz | psql postgresql://productivity:<DB_PASSWORD>@db:5432/productivity_db"
  # Phase 7: optional off-host sync via S3/R2 — set BACKUP_S3_BUCKET to enable; see .env.docker.example
  db_backup:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: ${DB_PASSWORD}
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 2 * * *}
      # Phase 7: optional off-host sync. Leave S3_BUCKET empty to keep local-only behaviour.
      S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      AWS_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${BACKUP_S3_REGION:-auto}
    volumes:
      - postgres_backups:/backups
      - ./deploy/scripts:/deploy/scripts:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    entrypoint: ["/deploy/scripts/entrypoint.sh"]

  prometheus:
    image: prom/prometheus:v2.52.0
    volumes:
      - ./deploy/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    mem_limit: 200m

  node-exporter:
    image: prom/node-exporter:v1.8.1
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped
    mem_limit: 30m

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped
    mem_limit: 100m

  grafana:
    image: grafana/grafana:11.1.0
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://grafana.mightguy.my.id
    depends_on:
      - prometheus
    restart: unless-stopped
    mem_limit: 150m

  uptime-kuma:
    image: louislam/uptime-kuma:1
    volumes:
      - uptime_kuma_data:/app/data
    restart: unless-stopped
    mem_limit: 150m
  cloudflared:
      image: cloudflare/cloudflared:latest
      command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
      depends_on:
        nginx:
          condition: service_healthy
      restart: unless-stopped

  gitea:
    image: gitea/gitea:1.22
    container_name: gitea
    restart: unless-stopped
    mem_limit: 256m
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__database__PATH=/data/gitea/gitea.db
      - GITEA__server__DOMAIN=git.mightguy.my.id
      - GITEA__server__ROOT_URL=https://git.mightguy.my.id
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__DISABLE_SSH=true
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - gitea_data:/data

  restic-backup:
    build:
      context: ./deploy
      dockerfile: Dockerfile.restic
    image: homelab-restic:latest
    container_name: restic-backup
    restart: unless-stopped
    mem_limit: 256m
    env_file: .env
    volumes:
      - productivity-project_postgres_backups:/data/postgres_backups:ro
      - productivity-project_gitea_data:/data/gitea_data:ro
      - productivity-project_grafana_data:/data/grafana_data:ro
      - productivity-project_uptime_kuma_data:/data/uptime_kuma_data:ro
      - ./deploy/scripts/restic-backup.sh:/restic-backup.sh:ro
      - /mnt/data/vaultwarden:/data/vaultwarden:ro
      - /mnt/data/miniflux-db:/data/miniflux-db:ro
      - /mnt/data/wallabag:/data/wallabag:ro
      - /mnt/data/nextcloud:/data/nextcloud:ro
      - /mnt/data/nextcloud-db:/data/nextcloud-db:ro
    profiles:
      - backup

  vaultwarden:
    image: vaultwarden/server:1.36.0
    container_name: vaultwarden
    restart: unless-stopped
    mem_limit: 150m
    environment:
      - DOMAIN=${VAULTWARDEN_DOMAIN}
      - ADMIN_TOKEN=${VAULTWARDEN_ADMIN_TOKEN}
      - SIGNUPS_ALLOWED=false
      - WEBSOCKET_ENABLED=true
      - LOG_LEVEL=warn
    volumes:
      - /mnt/data/vaultwarden:/data
    networks:
      - default

  miniflux-db:
    image: postgres:16-alpine
    container_name: miniflux-db
    restart: unless-stopped
    mem_limit: 150m
    environment:
      - POSTGRES_USER=miniflux
      - POSTGRES_PASSWORD=${MINIFLUX_DB_PASSWORD}
      - POSTGRES_DB=miniflux
    volumes:
      - /mnt/data/miniflux-db:/var/lib/postgresql/data
    networks:
      - default

  miniflux:
    image: miniflux/miniflux:2.2.5
    container_name: miniflux
    restart: unless-stopped
    mem_limit: 100m
    depends_on:
      - miniflux-db
    environment:
      - DATABASE_URL=postgres://miniflux:${MINIFLUX_DB_PASSWORD}@miniflux-db/miniflux?sslmode=disable
      - RUN_MIGRATIONS=1
      - CREATE_ADMIN=1
      - ADMIN_USERNAME=${MINIFLUX_ADMIN_USERNAME}
      - ADMIN_PASSWORD=${MINIFLUX_ADMIN_PASSWORD}
    networks:
      - default

  wallabag:
    image: wallabag/wallabag:2.6.9
    container_name: wallabag
    restart: unless-stopped
    mem_limit: 256m
    environment:
      - SYMFONY__ENV__SECRET=${WALLABAG_SECRET}
      - SYMFONY__ENV__FOSUSER_REGISTRATION=false
      - SYMFONY__ENV__FOSUSER_CONFIRMATION=false
      - SYMFONY__ENV__DATABASE_DRIVER=pdo_sqlite
      - SYMFONY__ENV__DATABASE_PATH=/var/www/wallabag/data/db/wallabag.sqlite
      - SYMFONY__ENV__DOMAIN_NAME=https://read.mightguy.my.id
      - POPULATE_DATABASE=true
    volumes:
      - /mnt/data/wallabag:/var/www/wallabag/data
    networks:
      - default

  nextcloud-db:
    image: mariadb:10.11
    container_name: nextcloud-db
    restart: unless-stopped
    mem_limit: 150m
    environment:
      - MYSQL_ROOT_PASSWORD=${NEXTCLOUD_DB_ROOT_PASSWORD}
      - MYSQL_PASSWORD=${NEXTCLOUD_DB_PASSWORD}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
    volumes:
      - /mnt/data/nextcloud-db:/var/lib/mysql
    networks:
      - default

  nextcloud-redis:
    image: redis:7-alpine
    container_name: nextcloud-redis
    restart: unless-stopped
    mem_limit: 50m
    networks:
      - default

  nextcloud:
    image: nextcloud:28-apache
    container_name: nextcloud
    restart: unless-stopped
    mem_limit: 512m
    depends_on:
      - nextcloud-db
      - nextcloud-redis
    environment:
      - MYSQL_HOST=nextcloud-db
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=${NEXTCLOUD_DB_PASSWORD}
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=cloud.mightguy.my.id
      - REDIS_HOST=nextcloud-redis
    volumes:
      - /mnt/data/nextcloud:/var/www/html
    networks:
      - default

volumes:
  postgres_data:
  uploads_data:      # Phase 2: named volume so attachments survive rebuilds
  postgres_backups:  # Phase 3: dedicated backup volume — mount externally for off-host copi es
  prometheus_data:
  grafana_data:
  uptime_kuma_data:
  gitea_data:
  productivity-project_postgres_backups:
    external: true
  productivity-project_gitea_data:
    external: true
  productivity-project_grafana_data:
    external: true
  productivity-project_uptime_kuma_data:
    external: true
