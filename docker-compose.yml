services:
  db:
    # Wave 6 (Moonshots): pgvector image bundles the `vector` extension required by
    # migration 014 for semantic search. Drop-in superset of postgres:16 — same
    # data dir layout, so existing postgres_data volumes mount unchanged.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: productivity
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: productivity_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U productivity -d productivity_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./server
    environment:
      DATABASE_URL: postgresql://productivity:${DB_PASSWORD}@db:5432/productivity_db
      # Phase 9: parameterized so staging/other domains don't require editing this file.
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-https://raflitriwijaya.my.id}
      SESSION_SECRET: ${SESSION_SECRET}
      NODE_ENV: production
      PORT: 3000
      # Wave 6: embeddings for semantic search + auto-tag (optional — blank disables).
      EMBEDDING_API_URL: ${EMBEDDING_API_URL:-https://api.deepseek.com/v1/embeddings}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      # Wave 7: AI Chat (DeepSeek cloud + optional local Ollama R1).
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
    volumes:
      # Phase 2: persist attachments across docker compose up --build
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # Phase 3: healthcheck so a hung-but-alive API is detected and restarted
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    build:
      context: ./client
      args:
        # Phase 9 / Fix 2: parameterized so staging/other domains work without editing this file.
        VITE_API_URL: ${VITE_API_URL:-https://raflitriwijaya.my.id}
        # Phase 9 / Fix 1: pass the Sentry DSN as a build arg so Sentry.init compiles in.
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
    ports:
      - "80:80"
    # Phase 3: wait for api to pass healthcheck before nginx starts serving
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    # Phase 3: healthcheck on nginx to detect crashed worker processes
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  # Phase 3: pg_dump sidecar — dumps DB on a cron schedule to a dedicated backup volume
  # Restore: docker run --rm -v postgres_backups:/backups -e PGPASSWORD=<DB_PASSWORD> postgres:16-alpine \
  #   sh -c "gunzip -c /backups/<file>.sql.gz | psql postgresql://productivity:<DB_PASSWORD>@db:5432/productivity_db"
  # Phase 7: optional off-host sync via S3/R2 — set BACKUP_S3_BUCKET to enable; see .env.docker.example
  db_backup:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: ${DB_PASSWORD}
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 2 * * *}
      # Phase 7: optional off-host sync. Leave S3_BUCKET empty to keep local-only behaviour.
      S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      AWS_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${BACKUP_S3_REGION:-auto}
    volumes:
      - postgres_backups:/backups
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    entrypoint: >
      sh -c "
        apk add --no-cache aws-cli >/dev/null 2>&1 || true;
        cat > /usr/local/bin/do-backup.sh << 'BACKUPEOF'
      #!/bin/sh
      set -e
      F=/backups/backup_$$(date +%Y%m%d_%H%M%S).sql.gz
      pg_dump postgresql://productivity:$$PGPASSWORD@db:5432/productivity_db | gzip > \"$$F\"
      echo \"local backup written: $$F\"
      if [ -n \"$$S3_BUCKET\" ]; then
        if [ -n \"$$S3_ENDPOINT\" ]; then
          aws --endpoint-url \"$$S3_ENDPOINT\" s3 cp \"$$F\" \"s3://$$S3_BUCKET/$$(basename $$F)\" && echo \"off-host copy ok\";
        else
          aws s3 cp \"$$F\" \"s3://$$S3_BUCKET/$$(basename $$F)\" && echo \"off-host copy ok\";
        fi
      else
        echo \"S3_BUCKET unset — off-host sync disabled (local backup only)\";
      fi
      BACKUPEOF
        chmod +x /usr/local/bin/do-backup.sh;
        echo \"$$BACKUP_SCHEDULE /usr/local/bin/do-backup.sh >> /backups/backup.log 2>&1\" | crontab -;
        crond -f -l 8
      "

volumes:
  postgres_data:
  uploads_data:      # Phase 2: named volume so attachments survive rebuilds
  postgres_backups:  # Phase 3: dedicated backup volume — mount externally for off-host copies
