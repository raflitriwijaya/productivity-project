groups:
  - name: polymath
    rules:
      - alert: HighErrorRate
        expr: rate(productivity_http_requests_total{status_code=~"5.."}[5m]) / rate(productivity_http_requests_total[5m]) > 0.05
        for: 5m
        labels: { severity: critical }
        annotations: { summary: "High error rate (>5%) on {{ $labels.route }}" }

      - alert: P99LatencySpike
        expr: histogram_quantile(0.99, rate(productivity_http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels: { severity: warning }
        annotations: { summary: "P99 latency >2s on {{ $labels.route }}" }

      - alert: PoolExhaustion
        expr: productivity_pg_pool_connections{state="waiting"} > 0
        for: 5m
        labels: { severity: critical }
        annotations: { summary: "Postgres pool has waiting clients" }

      - alert: PoolNearCapacity
        expr: productivity_pg_pool_connections{state="total"} / 10 > 0.8
        for: 10m
        labels: { severity: warning }
        annotations: { summary: "Postgres pool >80% capacity" }

      - alert: HealthCheckFailing
        expr: rate(productivity_http_requests_total{route="/health",status_code="503"}[5m]) > 0
        for: 2m
        labels: { severity: critical }
        annotations: { summary: "/health returning 503 — database may be down" }

      - alert: ScrapeDown
        expr: up{job="polymath-api"} == 0
        for: 5m
        labels: { severity: critical }
        annotations: { summary: "Metrics endpoint unreachable" }

      - alert: AIUpstreamHighLatency
        expr: histogram_quantile(0.95, rate(productivity_ai_upstream_duration_seconds_bucket[10m])) > 30
        for: 10m
        labels: { severity: warning }
        annotations: { summary: "AI upstream P95 latency >30s for {{ $labels.provider }}/{{ $labels.model }}" }

      - alert: AIUpstreamTimeoutRate
        expr: rate(productivity_ai_upstream_duration_seconds_count{status="timeout"}[10m]) / rate(productivity_ai_upstream_duration_seconds_count[10m]) > 0.1
        for: 5m
        labels: { severity: warning }
        annotations: { summary: "AI upstream timeout rate >10% for {{ $labels.provider }}/{{ $labels.model }}" }

      # V10 §8.1 — host-level alerts (disk, memory, container restarts, backup freshness)
      - alert: HostDiskFull
        expr: node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} < 0.10
        for: 10m
        labels: { severity: critical }
        annotations: { summary: "Host disk is >90% full on {{ $labels.instance }}" }

      - alert: HostMemoryPressure
        expr: node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes < 0.10
        for: 5m
        labels: { severity: critical }
        annotations: { summary: "Host memory <10% available on {{ $labels.instance }}" }

      - alert: ContainerRestarting
        expr: rate(cadvisor_container_restart_count_total[10m]) > 0
        for: 0m
        labels: { severity: warning }
        annotations: { summary: "Container {{ $labels.name }} is restarting" }

      - alert: BackupFreshness
        expr: time() - (max(restic_snapshot_timestamp) or 0) > 86400 * 2
        for: 0m
        labels: { severity: critical }
        annotations: { summary: "No backup snapshot in >48 hours" }
